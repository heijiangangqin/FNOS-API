<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FNOS-API</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; flex-direction: column; }
.header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; padding: 20px 30px; }
.header h1 { font-size: 22px; font-weight: 600; }
.header .subtitle { font-size: 13px; opacity: 0.85; margin-top: 4px; }
.content { flex: 1; display: flex; align-items: center; justify-content: center; }
.card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); padding: 40px 50px; text-align: center; max-width: 500px; }
.card .icon { font-size: 48px; margin-bottom: 16px; }
.card h2 { font-size: 20px; color: #333; margin-bottom: 8px; }
.card p { color: #666; font-size: 14px; line-height: 1.6; margin-bottom: 20px; }
.card .info { margin-top: 20px; font-size: 12px; color: #999; }
.footer { text-align: center; padding: 12px; font-size: 12px; color: #999; }
</style>
</head>
<body>
<div class="header">
  <h1>FNOS-API</h1>
  <div class="subtitle">TRIM NAS RESTful API - 封装 trim-cli 全部功能</div>
</div>
<div class="content">
  <div class="card">
    <div class="icon">🔌</div>
    <h2>FNOS-API 已就绪</h2>
    <p>将 trim-cli 命令行能力封装为 RESTful API，支持认证、文件管理、存储管理、Docker管理、下载任务、日志中心、用户管理、系统监控等全部模块。</p>
    <div class="info">调用 API 需在请求头携带 Authorization: Bearer &lt;token&gt;</div>
  </div>
</div>
<div class="footer">FNOS-API v1.0.0 · Powered by trim-cli</div>
</body>
</html>
